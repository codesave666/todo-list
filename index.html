<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯前端待办清单工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            min-height: 90vh;
        }

        header {
            background: linear-gradient(90deg, #4776E6 0%, #8E54E9 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        h1 i {
            font-size: 2.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .app-container {
            display: flex;
            flex-wrap: wrap;
            min-height: 600px;
        }

        /* 侧边栏样式 */
        .sidebar {
            flex: 0 0 300px;
            background-color: #f8f9fa;
            padding: 25px;
            border-right: 1px solid #eaeaea;
        }

        .category-filter {
            margin-bottom: 30px;
        }

        .category-filter h3 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #4776E6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .categories {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-btn {
            padding: 14px 20px;
            border: none;
            background-color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }

        .category-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .category-btn.active {
            background-color: #4776E6;
            color: white;
        }

        .category-btn i {
            font-size: 1.2rem;
        }

        .add-category {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .add-category input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        .add-category button {
            padding: 12px 20px;
            background-color: #8E54E9;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .add-category button:hover {
            background-color: #7a3fd6;
        }

        /* 主内容区样式 */
        .main-content {
            flex: 1;
            padding: 30px;
            min-width: 300px;
        }

        .task-form {
            background-color: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .task-form h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #4776E6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #4776E6;
            outline: none;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .submit-btn {
            background: linear-gradient(90deg, #4776E6 0%, #8E54E9 100%);
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(71, 118, 230, 0.3);
        }

        /* 任务列表样式 */
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .tasks-header h3 {
            font-size: 1.6rem;
            color: #4776E6;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-count {
            background-color: #4776E6;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }

        .tasks-container {
            min-height: 400px;
            border-radius: 15px;
            padding: 10px;
            transition: background-color 0.3s;
        }

        .tasks-container.drag-over {
            background-color: rgba(71, 118, 230, 0.05);
        }

        .task-card {
            background-color: white;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            cursor: move;
            transition: transform 0.3s, box-shadow 0.3s;
            border-left: 5px solid #4776E6;
            position: relative;
        }

        .task-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .task-card.dragging {
            opacity: 0.7;
            transform: rotate(3deg);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .task-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            flex: 1;
        }

        .task-category {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-left: 15px;
            background-color: #eef2ff;
            color: #4776E6;
        }

        .task-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .task-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-date {
            font-size: 0.9rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-actions {
            display: flex;
            gap: 12px;
        }

        .task-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .edit-btn {
            color: #4776E6;
        }

        .edit-btn:hover {
            background-color: rgba(71, 118, 230, 0.1);
        }

        .delete-btn {
            color: #ff4757;
        }

        .delete-btn:hover {
            background-color: rgba(255, 71, 87, 0.1);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #c3cfe2;
        }

        .empty-state h4 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        .footer {
            text-align: center;
            padding: 25px;
            color: #777;
            border-top: 1px solid #eee;
            margin-top: 30px;
            font-size: 0.95rem;
        }

        /* 响应式设计 */
        @media (max-width: 992px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid #eaeaea;
            }
        }

        @media (max-width: 576px) {
            .container {
                border-radius: 10px;
            }

            header {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            .form-row {
                flex-direction: column;
            }

            .task-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .task-category {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-tasks"></i> 纯前端待办清单工具</h1>
            <p class="subtitle">双击HTML文件即可使用，支持拖拽排序和分类管理</p>
        </header>

        <div class="app-container">
            <!-- 侧边栏：分类筛选 -->
            <div class="sidebar">
                <div class="category-filter">
                    <h3><i class="fas fa-filter"></i> 分类筛选</h3>
                    <div class="categories" id="categoryList">
                        <!-- 分类按钮将通过JS动态生成 -->
                    </div>

                    <div class="add-category">
                        <input type="text" id="newCategoryInput" placeholder="添加新分类...">
                        <button id="addCategoryBtn"><i class="fas fa-plus"></i> 添加</button>
                    </div>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="main-content">
                <!-- 添加任务表单 -->
                <div class="task-form">
                    <h3><i class="fas fa-plus-circle"></i> 添加新任务</h3>
                    <form id="taskForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="taskTitle">任务标题</label>
                                <input type="text" id="taskTitle" placeholder="输入任务标题..." required>
                            </div>
                            <div class="form-group">
                                <label for="taskCategory">分类</label>
                                <select id="taskCategory" required>
                                    <!-- 分类选项将通过JS动态生成 -->
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="taskDescription">任务描述</label>
                                <textarea id="taskDescription" placeholder="输入任务描述..."></textarea>
                            </div>
                        </div>

                        <button type="submit" class="submit-btn">
                            <i class="fas fa-plus"></i> 添加任务
                        </button>
                    </form>
                </div>

                <!-- 任务列表 -->
                <div class="tasks-header">
                    <h3><i class="fas fa-list-check"></i> 任务列表</h3>
                    <div class="task-count" id="taskCount">0 个任务</div>
                </div>

                <div class="tasks-container" id="tasksContainer">
                    <!-- 任务卡片将通过JS动态生成 -->
                    <div class="empty-state" id="emptyState">
                        <i class="fas fa-clipboard-list"></i>
                        <h4>暂无任务</h4>
                        <p>添加你的第一个任务吧！</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>纯前端待办清单工具 | 数据保存在本地浏览器中 | 支持拖拽排序和分类管理</p>
            <p>双击HTML文件即可使用，无需安装任何软件</p>
        </div>
    </div>

    <script>
        // 应用状态
        const state = {
            tasks: [],
            categories: ['工作', '个人', '学习', '购物'],
            currentCategory: 'all'
        };

        // DOM元素
        const elements = {
            categoryList: document.getElementById('categoryList'),
            newCategoryInput: document.getElementById('newCategoryInput'),
            addCategoryBtn: document.getElementById('addCategoryBtn'),
            taskForm: document.getElementById('taskForm'),
            taskTitle: document.getElementById('taskTitle'),
            taskCategory: document.getElementById('taskCategory'),
            taskDescription: document.getElementById('taskDescription'),
            tasksContainer: document.getElementById('tasksContainer'),
            taskCount: document.getElementById('taskCount'),
            emptyState: document.getElementById('emptyState')
        };

        // 初始化应用
        function initApp() {
            loadFromLocalStorage();
            renderCategories();
            renderTaskFormCategories();
            renderTasks();
            setupEventListeners();
            updateTaskCount();
        }

        // 从本地存储加载数据
        function loadFromLocalStorage() {
            const savedTasks = localStorage.getItem('todoTasks');
            const savedCategories = localStorage.getItem('todoCategories');

            if (savedTasks) {
                state.tasks = JSON.parse(savedTasks);
            }

            if (savedCategories) {
                state.categories = JSON.parse(savedCategories);
            }
        }

        // 保存数据到本地存储
        function saveToLocalStorage() {
            localStorage.setItem('todoTasks', JSON.stringify(state.tasks));
            localStorage.setItem('todoCategories', JSON.stringify(state.categories));
        }

        // 渲染分类列表
        function renderCategories() {
            elements.categoryList.innerHTML = '';

            // 添加"全部"分类
            const allBtn = document.createElement('button');
            allBtn.className = `category-btn ${state.currentCategory === 'all' ? 'active' : ''}`;
            allBtn.innerHTML = `<i class="fas fa-layer-group"></i> 全部任务`;
            allBtn.addEventListener('click', () => {
                state.currentCategory = 'all';
                renderCategories();
                renderTasks();
            });
            elements.categoryList.appendChild(allBtn);

            // 渲染每个分类
            state.categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${state.currentCategory === category ? 'active' : ''}`;

                // 获取分类图标
                const icon = getCategoryIcon(category);

                btn.innerHTML = `<i class="fas fa-${icon}"></i> ${category}`;
                btn.addEventListener('click', () => {
                    state.currentCategory = category;
                    renderCategories();
                    renderTasks();
                });

                elements.categoryList.appendChild(btn);
            });
        }

        // 获取分类图标
        function getCategoryIcon(category) {
            const iconMap = {
                '工作': 'briefcase',
                '个人': 'user',
                '学习': 'graduation-cap',
                '购物': 'shopping-cart',
                '健康': 'heartbeat',
                '旅行': 'plane',
                '家庭': 'home',
                '财务': 'money-bill'
            };

            return iconMap[category] || 'tag';
        }

        // 渲染任务表单中的分类选项
        function renderTaskFormCategories() {
            elements.taskCategory.innerHTML = '';

            state.categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                elements.taskCategory.appendChild(option);
            });

            // 如果没有分类，添加一个默认选项
            if (state.categories.length === 0) {
                const option = document.createElement('option');
                option.value = '未分类';
                option.textContent = '未分类';
                elements.taskCategory.appendChild(option);
            }
        }

        // 渲染任务列表
        function renderTasks() {
            elements.tasksContainer.innerHTML = '';

            // 筛选任务
            let filteredTasks = state.tasks;
            if (state.currentCategory !== 'all') {
                filteredTasks = state.tasks.filter(task => task.category === state.currentCategory);
            }

            // 如果没有任务，显示空状态
            if (filteredTasks.length === 0) {
                elements.emptyState.style.display = 'block';
                elements.tasksContainer.appendChild(elements.emptyState);
                return;
            }

            elements.emptyState.style.display = 'none';

            // 渲染每个任务卡片
            filteredTasks.forEach((task, index) => {
                const taskCard = createTaskCard(task, index);
                elements.tasksContainer.appendChild(taskCard);
            });

            // 设置拖拽功能
            setupDragAndDrop();
        }

        // 创建任务卡片元素
        function createTaskCard(task, index) {
            const card = document.createElement('div');
            card.className = 'task-card';
            card.setAttribute('data-id', task.id);
            card.setAttribute('draggable', 'true');

            // 生成卡片HTML
            card.innerHTML = `
                <div class="task-header">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <span class="task-category">${escapeHtml(task.category)}</span>
                </div>
                <div class="task-description">${escapeHtml(task.description || '暂无描述')}</div>
                <div class="task-footer">
                    <div class="task-date">
                        <i class="far fa-calendar"></i> 创建时间: ${formatDate(task.createdAt)}
                    </div>
                    <div class="task-actions">
                        <button class="edit-btn" title="编辑任务">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="delete-btn" title="删除任务">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;

            // 添加编辑事件
            const editBtn = card.querySelector('.edit-btn');
            editBtn.addEventListener('click', () => editTask(task.id));

            // 添加删除事件
            const deleteBtn = card.querySelector('.delete-btn');
            deleteBtn.addEventListener('click', () => deleteTask(task.id));

            // 拖拽事件
            card.addEventListener('dragstart', handleDragStart);
            card.addEventListener('dragover', handleDragOver);
            card.addEventListener('dragenter', handleDragEnter);
            card.addEventListener('dragleave', handleDragLeave);
            card.addEventListener('drop', handleDrop);
            card.addEventListener('dragend', handleDragEnd);

            return card;
        }

        // 转义HTML，防止XSS攻击
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 更新任务计数
        function updateTaskCount() {
            let count = state.tasks.length;
            if (state.currentCategory !== 'all') {
                count = state.tasks.filter(task => task.category === state.currentCategory).length;
            }

            elements.taskCount.textContent = `${count} 个任务`;
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 添加分类事件
            elements.addCategoryBtn.addEventListener('click', addNewCategory);
            elements.newCategoryInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addNewCategory();
                }
            });

            // 添加任务事件
            elements.taskForm.addEventListener('submit', addNewTask);
        }

        // 添加新分类
        function addNewCategory() {
            const newCategory = elements.newCategoryInput.value.trim();

            if (!newCategory) {
                alert('请输入分类名称');
                return;
            }

            if (state.categories.includes(newCategory)) {
                alert('该分类已存在');
                return;
            }

            state.categories.push(newCategory);
            elements.newCategoryInput.value = '';

            saveToLocalStorage();
            renderCategories();
            renderTaskFormCategories();
        }

        // 添加新任务
        function addNewTask(e) {
            e.preventDefault();

            const title = elements.taskTitle.value.trim();
            const category = elements.taskCategory.value;
            const description = elements.taskDescription.value.trim();

            if (!title) {
                alert('请输入任务标题');
                return;
            }

            // 创建新任务对象
            const newTask = {
                id: Date.now().toString(),
                title,
                category,
                description,
                createdAt: new Date().toISOString(),
                completed: false
            };

            // 添加到任务列表
            state.tasks.push(newTask);

            // 重置表单
            elements.taskForm.reset();

            // 保存并更新UI
            saveToLocalStorage();
            renderTasks();
            updateTaskCount();

            // 显示成功提示
            showNotification('任务添加成功！');
        }

        // 编辑任务
        function editTask(taskId) {
            const task = state.tasks.find(t => t.id === taskId);

            if (!task) return;

            // 使用表单数据填充
            elements.taskTitle.value = task.title;
            elements.taskCategory.value = task.category;
            elements.taskDescription.value = task.description;

            // 修改表单行为为更新任务
            const originalSubmitHandler = elements.taskForm.onsubmit;
            elements.taskForm.onsubmit = function(e) {
                e.preventDefault();

                task.title = elements.taskTitle.value.trim();
                task.category = elements.taskCategory.value;
                task.description = elements.taskDescription.value.trim();

                // 保存并更新UI
                saveToLocalStorage();
                renderTasks();
                updateTaskCount();

                // 重置表单行为
                elements.taskForm.onsubmit = originalSubmitHandler;
                elements.taskForm.reset();

                showNotification('任务更新成功！');
            };

            // 更改提交按钮文本
            const submitBtn = elements.taskForm.querySelector('.submit-btn');
            submitBtn.innerHTML = `<i class="fas fa-save"></i> 更新任务`;

            // 滚动到表单
            elements.taskForm.scrollIntoView({ behavior: 'smooth' });
        }

        // 删除任务
        function deleteTask(taskId) {
            if (!confirm('确定要删除这个任务吗？')) return;

            const taskIndex = state.tasks.findIndex(t => t.id === taskId);
            if (taskIndex === -1) return;

            state.tasks.splice(taskIndex, 1);

            saveToLocalStorage();
            renderTasks();
            updateTaskCount();

            showNotification('任务已删除');
        }

        // 显示通知
        function showNotification(message) {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(90deg, #4776E6 0%, #8E54E9 100%);
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
                z-index: 1000;
                font-weight: bold;
                transform: translateX(150%);
                transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            `;
            notification.textContent = message;

            document.body.appendChild(notification);

            // 显示通知
            setTimeout(() => {
                notification.style.transform = 'translateX(0)';
            }, 10);

            // 3秒后隐藏并移除通知
            setTimeout(() => {
                notification.style.transform = 'translateX(150%)';
                setTimeout(() => {
                    if (notification.parentNode) {
                        document.body.removeChild(notification);
                    }
                }, 500);
            }, 3000);
        }

        // 拖拽相关变量
        let draggedTask = null;
        let dragOverContainer = null;

        // 设置拖拽功能
        function setupDragAndDrop() {
            const taskCards = document.querySelectorAll('.task-card');

            taskCards.forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('dragenter', handleDragEnter);
                card.addEventListener('dragleave', handleDragLeave);
                card.addEventListener('drop', handleDrop);
                card.addEventListener('dragend', handleDragEnd);
            });
        }

        function handleDragStart(e) {
            draggedTask = this;
            this.classList.add('dragging');

            // 设置拖拽效果
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.getAttribute('data-id'));

            // 设置拖拽图像
            setTimeout(() => {
                this.style.opacity = '0.4';
            }, 0);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragEnter(e) {
            e.preventDefault();
            this.classList.add('drag-over');
            dragOverContainer = this;
        }

        function handleDragLeave() {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();

            this.classList.remove('drag-over');

            if (draggedTask !== this) {
                // 获取任务ID
                const draggedId = draggedTask.getAttribute('data-id');
                const targetId = this.getAttribute('data-id');

                // 在数组中重新排序任务
                const draggedIndex = state.tasks.findIndex(task => task.id === draggedId);
                const targetIndex = state.tasks.findIndex(task => task.id === targetId);

                if (draggedIndex !== -1 && targetIndex !== -1) {
                    // 从数组中移除拖拽的任务
                    const [draggedTaskObj] = state.tasks.splice(draggedIndex, 1);
                    // 插入到目标位置
                    state.tasks.splice(targetIndex, 0, draggedTaskObj);

                    // 保存并重新渲染
                    saveToLocalStorage();
                    renderTasks();
                    updateTaskCount();

                    showNotification('任务顺序已更新');
                }
            }

            return false;
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            this.style.opacity = '1';

            // 移除所有drag-over类
            const dragOverElements = document.querySelectorAll('.drag-over');
            dragOverElements.forEach(el => {
                el.classList.remove('drag-over');
            });

            draggedTask = null;
            dragOverContainer = null;
        }

        // 页面加载完成后初始化应用
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
